<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Monitor</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .header {
            color: #ffd700; /* Veritas Gold */
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }
        .stat-item {
            background-color: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        }
        .stat-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
        }
        .stat-label {
            font-size: 1.2em;
            color: #aaaaaa;
            margin-bottom: 10px;
        }
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #ffd700; /* Veritas Gold */
        }
    </style>
</head>
<body>
    <h1 class="header">VERITAS System Monitor</h1>
    <div class="stats-grid" id="stats-grid"></div>

    <script>
        const fetchStats = async () => {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                const grid = document.getElementById('stats-grid');
                grid.innerHTML = ''; // Clear previous stats

                for (const key in data) {
                    const item = document.createElement('div');
                    item.className = 'stat-item';

                    const label = document.createElement('div');
                    label.className = 'stat-label';
                    label.textContent = key.replace(/_/g, ' ').toUpperCase();

                    const value = document.createElement('div');
                    value.className = 'stat-value';
                    if (key.includes('usage')) {
                        value.textContent = `${data[key].toFixed(1)}%`;
                    } else if (key.includes('network')) {
                        value.textContent = `${(data[key] / 1024 / 1024).toFixed(2)} MB`; // Convert bytes to MB
                    } else {
                        value.textContent = data[key];
                    }
                    
                    item.appendChild(label);
                    item.appendChild(value);
                    grid.appendChild(item);
                }
            } catch (error) {
                console.error('Error fetching system stats:', error);
                const grid = document.getElementById('stats-grid');
                grid.innerHTML = '<div class="stat-item" style="grid-column: 1 / -1; color: #ff6347;">Error loading stats. Please ensure the backend is running.</div>';
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            fetchStats();
            setInterval(fetchStats, 3000); // Refresh stats every 3 seconds
        });
    </script>
</body>
</html>
