<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veritas Defense Grid</title>
    <link rel="stylesheet" href="grid.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar glassmorphism">
            <div class="logo">VERITAS</div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active">Overview</a>
                <a href="#" class="nav-item">Threats</a>
                <a href="#" class="nav-item">Logs</a>
                <a href="#" class="nav-item">Systems</a>
                <a href="#" class="nav-item">Settings</a>
            </nav>
            <div class="system-status glassmorphism">
                <h3>System Status</h3>
                <p>Core Integrity: <span class="status-ok">ONLINE</span></p>
                <p>Threat Level: <span class="status-warning">ELEVATED</span></p>
            </div>
        </aside>

        <main class="main-content">
            <header class="header glassmorphism">
                <h1>Veritas Defense Grid // Active Monitoring</h1>
                <div class="user-profile">
                    <span>Agent R.J.</span>
                    <div class="avatar"></div>
                </div>
            </header>

            <section class="grid-panel glassmorphism">
                <div id="hexGridOverlay"></div>
                <div id="radarSweep"></div>
                <div id="blipContainer"></div>
            </section>

            <div class="data-panels">
                <div class="data-card glassmorphism">
                    <h3>Intrusion Attempts</h3>
                    <p id="intrusionCount">0</p>
                </div>
                <div class="data-card glassmorphism">
                    <h3>Clean Payloads</h3>
                    <p id="cleanPayloadCount">0</p>
                </div>
                <div class="data-card glassmorphism">
                    <h3>System Uptime</h3>
                    <p id="uptime">00:00:00</p>
                </div>
            </div>
        </main>
    </div>
    <script src="grid.js"></script>
</body>
</html>
