<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veritas Fun Page</title>
    <style>
        body {
            background: linear-gradient(45deg, #2c2c2c 30%, #3b3b3b 70%);
            color: white;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
        }
        .header {
            background-color: black;
            text-align: center;
            padding: 20px;
        }
        .logo {
            width: 150px;
            height: auto;
        }
        .content {
            margin-top: 40px;
            text-align: center;
        }
        button {
            background-color: #2c2c2c;
            color: gold;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover {
            background-color: #3b3b3b;
            color: white;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="veritas-logo.png" alt="Veritas Logo" class="logo">
    </div>
    <div class="content">
        <h1>Welcome to the Veritas Fun Page!</h1>
        <button onclick="alert('Welcome!')">Click Me</button>
    </div>
</body>
<script>
    // Add any JavaScript effects here
</script>
</html>
