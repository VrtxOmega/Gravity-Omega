<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Network Health Dashboard</title>
    <style>
        body { background-color: #1e1e1e; color: white; font-family: Arial, sans-serif; }
        .container { max-width: 600px; margin: auto; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,.15); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Network Health Status</h1>
        <p id="status"></p>
        <script>
            fetch('/ping')
                .then(response => response.json())
                .then(data => document.getElementById('status').innerText = JSON.stringify(data, null, 2));
        </script>
    </div>
</body>
</html>
